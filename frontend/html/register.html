<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YCuisine - Inscription</title>
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FFF8F0 0%, #FFE8CC 100%); padding: 2rem 0;">

  <div class="form-container">
    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="/" style="text-decoration: none;">
        <h1 class="logo" style="font-size: 2.5rem; margin-bottom: 0.5rem;">🍽️ YCuisine</h1>
      </a>
    </div>

    <h2 class="form-title">Créer un compte</h2>

    <form action="/register" method="post">
      <div class="form-group">
        <label for="email">📧 Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="votre@email.com"
          required
          autocomplete="email"
        >
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label for="firstname">👤 Prénom</label>
          <input
            type="text"
            id="firstname"
            name="firstname"
            placeholder="Prénom"
            required
            autocomplete="given-name"
          >
        </div>

        <div class="form-group">
          <label for="lastname">👤 Nom</label>
          <input
            type="text"
            id="lastname"
            name="lastname"
            placeholder="Nom"
            required
            autocomplete="family-name"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">🔒 Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="new-password"
          minlength="6"
        >
        <small style="color: var(--text-secondary); font-size: 0.85rem;">
          Minimum 6 caractères
        </small>
      </div>

      <div class="form-group">
        <label for="passwordV">🔒 Confirmer le mot de passe</label>
        <input
          type="password"
          id="passwordV"
          name="passwordV"
          placeholder="••••••••"
          required
          autocomplete="new-password"
          minlength="6"
        >
      </div>

      {{if .Errmsg}}
        <div class="error-message">
          ⚠️ {{.Errmsg}}
        </div>
      {{end}}

      <div style="margin-top: 1.5rem;">
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
          Créer mon compte
        </button>
      </div>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #E0E0E0;">
      <p style="color: var(--text-secondary);">
        Déjà un compte ?
        <a href="/login" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">
          Se connecter
        </a>
      </p>
      <p style="color: var(--text-secondary); margin-top: 0.5rem;">
        <a href="/" style="color: var(--text-secondary); text-decoration: none;">
          ← Retour à l'accueil
        </a>
      </p>
    </div>
  </div>

  <script>
    // Animation d'entrée
    const formContainer = document.querySelector('.form-container');
    formContainer.style.opacity = '0';
    formContainer.style.transform = 'translateY(30px)';

    setTimeout(() => {
      formContainer.style.transition = 'all 0.5s ease';
      formContainer.style.opacity = '1';
      formContainer.style.transform = 'translateY(0)';
    }, 100);

    // Validation des mots de passe
    const form = document.querySelector('form');
    const password = document.getElementById('password');
    const passwordV = document.getElementById('passwordV');

    form.addEventListener('submit', (e) => {
      if (password.value !== passwordV.value) {
        e.preventDefault();
        alert('⚠️ Les mots de passe ne correspondent pas !');
        passwordV.focus();
      }
    });
  </script>
</body>
</html>
