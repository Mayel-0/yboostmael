<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YCuisine - Vérification</title>
  <link rel="stylesheet" href="/CSS/style.css">
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #FFF8F0 0%, #FFE8CC 100%);">

  <div class="form-container">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="font-size: 4rem; margin-bottom: 1rem;">✉️</div>
      <h1 class="logo" style="font-size: 2rem; margin-bottom: 0.5rem;">Vérification</h1>
      <p style="color: var(--text-secondary); font-size: 0.95rem;">
        Un code de vérification a été envoyé à votre email
      </p>
    </div>

    <form action="/verify" method="post" class="verify">
      <input type="hidden" name="Users_id" value="{{.User_id}}">

      <div class="form-group">
        <label for="code">🔢 Code de vérification (6 chiffres)</label>
        <input
          type="text"
          id="code"
          name="code"
          placeholder="123456"
          required
          maxlength="6"
          pattern="[0-9]{6}"
          style="font-size: 1.5rem; text-align: center; letter-spacing: 0.5rem;"
          autocomplete="off"
        >
        <small style="color: var(--text-secondary); font-size: 0.85rem;">
          Le code expire dans 5 minutes
        </small>
      </div>

      {{if .Errmsg}}
        <div class="error-message">
          ⚠️ {{.Errmsg}}
        </div>
      {{end}}

      <div style="margin-top: 1.5rem;">
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
          Vérifier le code
        </button>
      </div>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #E0E0E0;">
      <p style="color: var(--text-secondary); font-size: 0.9rem;">
        Vous n'avez pas reçu le code ?
      </p>
      <p style="color: var(--text-secondary); margin-top: 0.5rem;">
        <a href="/login" style="color: var(--text-secondary); text-decoration: none;">
          ← Retour à la connexion
        </a>
      </p>
    </div>
  </div>

  <script>
    // Animation d'entrée
    const formContainer = document.querySelector('.form-container');
    formContainer.style.opacity = '0';
    formContainer.style.transform = 'translateY(30px)';

    setTimeout(() => {
      formContainer.style.transition = 'all 0.5s ease';
      formContainer.style.opacity = '1';
      formContainer.style.transform = 'translateY(0)';
    }, 100);

    // Auto-focus sur l'input
    const codeInput = document.getElementById('code');
    codeInput.focus();

    // N'accepter que les chiffres
    codeInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });
  </script>
</body>
</html>
